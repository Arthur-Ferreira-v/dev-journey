<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário Profissional</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7fc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        h2 {
            font-size: 24px;
            color: #333;
            margin-bottom: 20px;
        }

        input[type="text"],
        input[type="email"],
        input[type="number"] {
            width: 80%;
            padding: 12px;
            font-size: 16px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 5px;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="number"]:focus {
            border-color: #4CAF50;
        }

        button {
            padding: 12px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #45a049;
        }

        #resultado {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        .erro {
            color: red;
        }

        .sucesso {
            color: green;
        }
    </style>
    <script>
        function verificarFormulario() {
            var nome = document.getElementById("nome").value;
            var email = document.getElementById("email").value;
            var profissao = document.getElementById("profissao").value;
            var idade = document.getElementById("idade").value;
            var resultado = document.getElementById("resultado");

            if (nome === "" || email === "" || profissao === "" || idade === "") {
                resultado.innerHTML = "Por favor, preencha todos os campos!";
                resultado.className = "erro";
            } else {
                resultado.innerHTML = "Seu nome é: " + nome + "<br>" +
                                      "Seu email é: " + email + "<br>" +
                                      "Sua profissão é: " + profissao + "<br>" +
                                      "Sua idade é: " + idade;
                resultado.className = "sucesso";
            }
        }
    </script>
</head>
<body>
    <div class="container">
        <h2>Formulário de Cadastro</h2>
        <input type="text" id="nome" placeholder="Seu nome">
        <input type="email" id="email" placeholder="Seu email">
        <input type="text" id="profissao" placeholder="Sua profissão">
        <input type="number" id="idade" placeholder="Sua idade">
        <button onclick="verificarFormulario()">Confirmar</button>
        <p id="resultado"></p>
    </div>
</body>
</html>
